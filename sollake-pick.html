<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Sollake Pick</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --lime:#B5F033;--lime-d:#93C920;
  --navy:#0B1929;--navy2:#122032;--navy3:#1A2E42;--navy4:#243A52;
  --text:#E2EDF8;--muted:#7A9BB8;
  --border:rgba(255,255,255,0.09);--card:rgba(18,32,50,0.9);
  --r:12px;--rs:8px;
  --danger:#F87171;--success:#4ADE80;--warn:#FCD34D;
  --nav-h:56px;--bot-h:62px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--navy4);border-radius:10px}

/* TOP NAV */
.topnav{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 1.25rem;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:rgba(11,25,41,0.97);backdrop-filter:blur(14px);z-index:200;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--lime);letter-spacing:-.5px;white-space:nowrap}
.logo span{color:var(--text)}
.nav-tabs{display:flex;gap:3px}
.tab-btn{background:none;border:none;color:var(--muted);padding:.4rem .85rem;border-radius:50px;cursor:pointer;font-size:.82rem;font-family:'Inter',sans-serif;font-weight:500;transition:all .18s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.tab-btn.active{color:var(--navy);background:var(--lime);font-weight:600}
.btn-log{background:var(--lime);color:var(--navy);border:none;border-radius:var(--rs);padding:.42rem 1rem;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn-log:hover{background:var(--lime-d)}

/* BOTTOM NAV */
.botnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);
  background:rgba(11,25,41,0.98);border-top:1px solid var(--border);
  z-index:200;backdrop-filter:blur(14px);
  padding-bottom:env(safe-area-inset-bottom);}
.botnav-inner{display:grid;grid-template-columns:repeat(5,1fr);height:var(--bot-h)}
.bot-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);transition:color .18s;padding:.2rem .25rem;font-family:'Inter',sans-serif}
.bot-tab .bicon{font-size:1.2rem;line-height:1}
.bot-tab .blabel{font-size:.6rem;font-weight:500;letter-spacing:.2px}
.bot-tab.active{color:var(--lime)}
.bot-tab.add-btn .bicon{background:var(--lime);color:var(--navy);border-radius:50%;width:38px;height:38px;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(181,240,51,.35)}

/* PAGES */
.page{display:none;max-width:1100px;margin:0 auto;padding:1.25rem 1rem}
.page.active{display:block}

/* PANELS */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.panel-hd{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.panel-hd .right{display:flex;gap:.35rem;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{border:none;border-radius:var(--rs);padding:.42rem .9rem;font-size:.8rem;font-family:'Inter',sans-serif;cursor:pointer;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:.3rem;line-height:1.2}
.btn-lime{background:var(--lime);color:var(--navy)}.btn-lime:hover{background:var(--lime-d)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:rgba(255,255,255,.11)}
.btn-danger{background:rgba(248,113,113,.14);color:var(--danger);border:1px solid rgba(248,113,113,.2)}.btn-danger:hover{background:rgba(248,113,113,.25)}
.btn-sm{padding:.3rem .65rem;font-size:.75rem}.btn-xs{padding:.2rem .5rem;font-size:.7rem}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1rem}

/* SUMMARY CARD */
.sc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--rs);padding:.75rem 1rem}
.sc .val{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:700;line-height:1.15}
.sc .lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:.25rem}

/* FILTER ROW */
.filter-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.85rem}
.filter-row label{font-size:.73rem;color:var(--muted);white-space:nowrap}
.filter-row .finput{width:auto;flex:1;min-width:110px}

/* FORM */
.fgroup{margin-bottom:.9rem}
.fgroup label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:.3rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.finput{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:var(--rs);padding:.52rem .8rem;color:var(--text);font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.finput:focus{border-color:rgba(181,240,51,.45)}
.finput option{background:var(--navy2)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;padding:1.5rem 1.25rem;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative}
.modal::before{content:'';display:block;width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 1.1rem}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:1.1rem;color:var(--lime)}
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.1rem;padding-top:.9rem;border-top:1px solid var(--border)}

/* TABLES */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:420px}
th{font-size:.67rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);padding:.55rem .7rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:.6rem .7rem;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* CARD LIST (mobile) */
.card-list{display:flex;flex-direction:column;gap:.5rem}
.card-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--rs);padding:.85rem .9rem}
.card-item-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.card-meta{font-size:.72rem;color:var(--muted);margin-top:.35rem;display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}

/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0}
.av-lg{width:40px;height:40px;font-size:.8rem}
.av-wrap{display:flex;align-items:center;gap:.55rem;min-width:0;overflow:hidden}
.av-wrap .aname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* RANK */
.rnum{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.95rem}
.r1{color:var(--warn)}.r2{color:#C0C0C0}.r3{color:#CD7F32}

/* PILLS */
.pill{display:inline-block;border-radius:50px;padding:2px 9px;font-size:.68rem;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.p-green{background:rgba(74,222,128,.15);color:var(--success)}
.p-red{background:rgba(248,113,113,.15);color:var(--danger)}
.p-lime{background:rgba(181,240,51,.15);color:var(--lime)}
.p-yellow{background:rgba(252,211,77,.15);color:var(--warn)}
.p-gray{background:rgba(255,255,255,.07);color:var(--muted)}

/* AVATAR COLORS */
.c0{background:rgba(181,240,51,.18);color:var(--lime)}
.c1{background:rgba(96,165,250,.18);color:#60A5FA}
.c2{background:rgba(248,113,113,.18);color:var(--danger)}
.c3{background:rgba(74,222,128,.18);color:var(--success)}
.c4{background:rgba(251,146,60,.18);color:#FB923C}
.c5{background:rgba(196,181,253,.18);color:#C4B5FD}
.c6{background:rgba(34,211,238,.18);color:#22D3EE}
.c7{background:rgba(249,168,212,.18);color:#F9A8D4}

/* FINANCE ROW */
.fin-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.62rem .75rem;border-radius:var(--rs);border:1px solid var(--border);margin-bottom:.4rem;background:rgba(255,255,255,.02)}
.fin-row:hover{background:rgba(255,255,255,.04)}
.fin-row .fleft{min-width:0;flex:1}
.fin-row .fright{display:flex;align-items:center;gap:.4rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

/* HIDDEN BADGE */
.hbadge{font-size:.62rem;background:rgba(255,255,255,.07);color:var(--muted);padding:1px 6px;border-radius:50px;border:1px dashed rgba(255,255,255,.15);margin-left:.3rem}

/* SEC TITLE */
.sec-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* MISC */
.score-disp{font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;white-space:nowrap}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.ei{font-size:2rem;margin-bottom:.6rem;opacity:.4}
.empty p{font-size:.82rem}
.mt1{margin-top:.9rem}.mt2{margin-top:1.5rem}
.gap{display:flex;gap:.4rem;flex-wrap:wrap}
.tm{color:var(--muted)}.tl{color:var(--lime)}.td{color:var(--danger)}.ts{color:var(--success)}.tw{color:var(--warn)}
.bold{font-weight:600}.small{font-size:.73rem}
.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif{position:fixed;top:.85rem;left:50%;transform:translate(-50%,-200%);width:min(90vw,340px);
  background:var(--navy3);border:1px solid var(--lime);border-radius:var(--rs);
  padding:.65rem 1.1rem;font-size:.82rem;color:var(--lime);z-index:999;
  transition:transform .3s;font-weight:600;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.45);}
.notif.show{transform:translate(-50%,0)}
.match-vs{display:grid;grid-template-columns:1fr auto 1fr;gap:.6rem;align-items:start}
.player-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-tabs{display:none}
  .botnav{display:block}
  body{padding-bottom:calc(var(--bot-h) + env(safe-area-inset-bottom))}
  .page{padding:1rem .8rem}
  .panel{padding:.9rem .85rem}
  .topnav{padding:0 .85rem}
  .g2{grid-template-columns:1fr}
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .match-vs{grid-template-columns:1fr}
  .match-vs .vs-sep{display:none}
}
@media(min-width:769px){
  body{padding-bottom:0}
  .botnav{display:none}
}
/* mobile/desktop toggle */
.mob{display:none}.desk{display:block}
@media(max-width:600px){.mob{display:block}.desk{display:none}}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="logo">Sollake <span>Pick</span> 🏓</div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showPage('ranking')">🏆 Xếp hạng</button>
    <button class="tab-btn" onclick="showPage('matches')">🏓 Trận đấu</button>
    <button class="tab-btn" onclick="showPage('players')">👥 Thành viên</button>
    <button class="tab-btn" onclick="showPage('finance')">💰 Thu chi</button>
  </div>
  <button class="btn-log" onclick="openModal('matchModal')">+ Ghi trận</button>
</nav>

<!-- BOTTOM NAV -->
<nav class="botnav">
  <div class="botnav-inner">
    <button class="bot-tab active" onclick="showPage('ranking');botActive(this)">
      <span class="bicon">🏆</span><span class="blabel">Xếp hạng</span>
    </button>
    <button class="bot-tab" onclick="showPage('matches');botActive(this)">
      <span class="bicon">🏓</span><span class="blabel">Trận đấu</span>
    </button>
    <button class="bot-tab add-btn" onclick="openModal('matchModal')">
      <span class="bicon">＋</span><span class="blabel">Ghi trận</span>
    </button>
    <button class="bot-tab" onclick="showPage('players');botActive(this)">
      <span class="bicon">👥</span><span class="blabel">Thành viên</span>
    </button>
    <button class="bot-tab" onclick="showPage('finance');botActive(this)">
      <span class="bicon">💰</span><span class="blabel">Thu chi</span>
    </button>
  </div>
</nav>

<!-- PAGE: RANKING -->
<div class="page active" id="page-ranking">
  <div class="sec-title">Bảng xếp hạng</div>
  <div class="panel">
    <div class="panel-hd">Lọc thời gian
      <div class="right">
        <button class="btn btn-ghost btn-sm" onclick="setRankPeriod('week')">7 ngày</button>
        <button class="btn btn-ghost btn-sm" onclick="setRankPeriod('month')">30 ngày</button>
        <button class="btn btn-ghost btn-sm" onclick="setRankPeriod('all')">Tất cả</button>
      </div>
    </div>
    <div class="filter-row">
      <label>Từ</label><input type="date" class="finput" id="rankFrom" onchange="renderRanking()"/>
      <label>Đến</label><input type="date" class="finput" id="rankTo" onchange="renderRanking()"/>
    </div>
    <div class="desk tbl-wrap" id="rankD"></div>
    <div class="mob" id="rankM"></div>
  </div>
</div>

<!-- PAGE: MATCHES -->
<div class="page" id="page-matches">
  <div class="sec-title">Lịch sử trận đấu</div>
  <div class="panel">
    <div class="panel-hd">Lọc thời gian
      <div class="right">
        <button class="btn btn-ghost btn-sm" onclick="setMatchPeriod('week')">7 ngày</button>
        <button class="btn btn-ghost btn-sm" onclick="setMatchPeriod('month')">30 ngày</button>
        <button class="btn btn-ghost btn-sm" onclick="setMatchPeriod('all')">Tất cả</button>
      </div>
    </div>
    <div class="filter-row">
      <label>Từ</label><input type="date" class="finput" id="matchFrom" onchange="renderMatches()"/>
      <label>Đến</label><input type="date" class="finput" id="matchTo" onchange="renderMatches()"/>
    </div>
    <div class="desk tbl-wrap" id="matchD"></div>
    <div class="mob" id="matchM"></div>
  </div>
</div>

<!-- PAGE: PLAYERS -->
<div class="page" id="page-players">
  <div class="sec-title">Quản lý thành viên</div>
  <div class="player-bar">
    <button class="btn btn-lime" onclick="openModal('addPlayerModal')">+ Thêm thành viên</button>
    <button class="btn btn-ghost" onclick="toggleHidden()" id="hiddenBtn">👁 Xem thành viên ẩn</button>
  </div>
  <div class="panel">
    <div class="desk tbl-wrap" id="playerD"></div>
    <div class="mob" id="playerM"></div>
  </div>
</div>

<!-- PAGE: FINANCE -->
<div class="page" id="page-finance">
  <div class="sec-title">Quản lý thu chi & phạt</div>
  <div class="summary-row" id="finSum"></div>
  <div class="g2">
    <div class="panel">
      <div class="panel-hd">💰 Thu chi
        <div class="right">
          <button class="btn btn-ghost btn-sm" onclick="setFinPeriod('month')">30 ngày</button>
          <button class="btn btn-ghost btn-sm" onclick="setFinPeriod('all')">Tất cả</button>
          <button class="btn btn-lime btn-sm" onclick="openModal('finModal')">+ Thêm</button>
        </div>
      </div>
      <div class="filter-row">
        <label>Từ</label><input type="date" class="finput" id="finFrom" onchange="renderFinance()"/>
        <label>Đến</label><input type="date" class="finput" id="finTo" onchange="renderFinance()"/>
      </div>
      <div id="finList"></div>
    </div>
    <div class="panel">
      <div class="panel-hd">⚠️ Khoản phạt
        <div class="right"><button class="btn btn-danger btn-sm" onclick="openModal('fineModal')">+ Ghi phạt</button></div>
      </div>
      <div id="fineList"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-hd">📋 Công nợ thành viên</div>
    <div class="tbl-wrap" id="debtTbl"></div>
  </div>
</div>

<!-- MODAL: ADD PLAYER -->
<div class="modal-bg" id="addPlayerModal">
  <div class="modal">
    <div class="modal-title">👤 Thêm thành viên mới</div>
    <div class="fgroup"><label>Họ tên</label><input class="finput" id="pName" placeholder="Nguyễn Văn A"/></div>
    <div class="fgroup"><label>Điểm khởi đầu (ELO)</label><input class="finput" id="pScore" type="number" value="1000" min="0"/></div>
    <div class="fgroup"><label>Trình độ</label>
      <select class="finput" id="pLevel">
        <option>Mới</option><option>Cơ bản</option><option selected>Trung cấp</option><option>Nâng cao</option><option>Chuyên</option>
      </select>
    </div>
    <div class="fgroup"><label>Ghi chú</label><input class="finput" id="pNote" placeholder="Thông tin thêm..."/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addPlayerModal')">Hủy</button>
      <button class="btn btn-lime" onclick="addPlayer()">Thêm thành viên</button>
    </div>
  </div>
</div>

<!-- MODAL: LOG MATCH -->
<div class="modal-bg" id="matchModal">
  <div class="modal">
    <div class="modal-title">🏓 Ghi trận mới</div>
    <div class="fgroup"><label>Ngày thi đấu</label><input class="finput" id="mDate" type="date"/></div>
    <div class="fgroup"><label>Loại trận</label>
      <select class="finput" id="mType" onchange="updateMF()">
        <option value="singles">Đơn (1 vs 1)</option>
        <option value="doubles">Đôi (2 vs 2)</option>
      </select>
    </div>
    <div class="match-vs">
      <div>
        <div class="fgroup"><label>Bên A – Người 1</label><select class="finput" id="mA1"></select></div>
        <div class="fgroup" id="mA2w"><label>Bên A – Người 2</label><select class="finput" id="mA2"></select></div>
        <div class="fgroup"><label>Điểm bên A</label><input class="finput" id="mScoreA" type="number" min="0" value="11"/></div>
      </div>
      <div class="vs-sep" style="text-align:center;padding-top:1.6rem;font-size:1.3rem;color:var(--muted)">VS</div>
      <div>
        <div class="fgroup"><label>Bên B – Người 1</label><select class="finput" id="mB1"></select></div>
        <div class="fgroup" id="mB2w"><label>Bên B – Người 2</label><select class="finput" id="mB2"></select></div>
        <div class="fgroup"><label>Điểm bên B</label><input class="finput" id="mScoreB" type="number" min="0" value="8"/></div>
      </div>
    </div>
    <div class="fgroup"><label>Ghi chú</label><input class="finput" id="mNote" placeholder="Trận chung kết, vòng loại..."/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('matchModal')">Hủy</button>
      <button class="btn btn-lime" onclick="logMatch()">Lưu trận đấu</button>
    </div>
  </div>
</div>

<!-- MODAL: FINANCE -->
<div class="modal-bg" id="finModal">
  <div class="modal">
    <div class="modal-title">💰 Thêm thu chi</div>
    <div class="fgroup"><label>Loại</label>
      <select class="finput" id="finType"><option value="thu">Thu (nhận tiền)</option><option value="chi">Chi (thanh toán)</option></select>
    </div>
    <div class="fgroup"><label>Nội dung</label><input class="finput" id="finDesc" placeholder="Thuê sân, mua bóng..."/></div>
    <div class="fgroup"><label>Số tiền (VNĐ)</label><input class="finput" id="finAmt" type="number" placeholder="200000"/></div>
    <div class="fgroup"><label>Thành viên (nếu có)</label><select class="finput" id="finPlayer"><option value="">-- Quỹ chung --</option></select></div>
    <div class="fgroup"><label>Ngày</label><input class="finput" id="finDate" type="date"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('finModal')">Hủy</button>
      <button class="btn btn-lime" onclick="addFinance()">Lưu</button>
    </div>
  </div>
</div>

<!-- MODAL: FINE -->
<div class="modal-bg" id="fineModal">
  <div class="modal">
    <div class="modal-title">⚠️ Ghi phạt thành viên</div>
    <div class="fgroup"><label>Thành viên bị phạt</label><select class="finput" id="finePlayer"></select></div>
    <div class="fgroup"><label>Lý do phạt</label><input class="finput" id="fineReason" placeholder="Đến trễ, bỏ buổi..."/></div>
    <div class="fgroup"><label>Số tiền phạt (VNĐ)</label><input class="finput" id="fineAmt" type="number" placeholder="50000"/></div>
    <div class="fgroup"><label>Ngày</label><input class="finput" id="fineDate" type="date"/></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('fineModal')">Hủy</button>
      <button class="btn btn-danger" onclick="addFine()">Ghi phạt</button>
    </div>
  </div>
</div>

<!-- MODAL: PAY FINE -->
<div class="modal-bg" id="payFineModal">
  <div class="modal">
    <div class="modal-title">✅ Xác nhận nộp phạt</div>
    <div id="payFineContent"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('payFineModal')">Hủy</button>
      <button class="btn btn-lime" onclick="confirmPayFine()">Xác nhận đã nộp</button>
    </div>
  </div>
</div>

<script>
const COLORS=['c0','c1','c2','c3','c4','c5','c6','c7'];
let showHidden=false,pendingFineId=null;
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

let players=ld('sp2_players',[
  {id:1,name:'Trần Minh Khoa',score:1350,level:'Nâng cao',note:'Đội trưởng',color:'c0',visible:true,joined:'2024-01-10'},
  {id:2,name:'Nguyễn Thu Hà',score:1280,level:'Nâng cao',note:'',color:'c1',visible:true,joined:'2024-02-05'},
  {id:3,name:'Lê Đức Thành',score:1190,level:'Trung cấp',note:'',color:'c2',visible:true,joined:'2024-03-12'},
  {id:4,name:'Phạm Ngọc Anh',score:1140,level:'Trung cấp',note:'',color:'c3',visible:true,joined:'2024-03-20'},
  {id:5,name:'Hoàng Việt Long',score:1080,level:'Cơ bản',note:'',color:'c4',visible:true,joined:'2024-05-01'},
]);
let matches=ld('sp2_matches',[
  {id:1,date:'2025-06-18',type:'singles',a:['Trần Minh Khoa'],b:['Nguyễn Thu Hà'],scoreA:11,scoreB:7,note:'',winner:'A',elo:16},
  {id:2,date:'2025-06-20',type:'doubles',a:['Trần Minh Khoa','Lê Đức Thành'],b:['Nguyễn Thu Hà','Phạm Ngọc Anh'],scoreA:11,scoreB:9,note:'Trận hội',winner:'A',elo:12},
  {id:3,date:'2025-06-22',type:'singles',a:['Nguyễn Thu Hà'],b:['Lê Đức Thành'],scoreA:8,scoreB:11,note:'',winner:'B',elo:14},
]);
let finances=ld('sp2_finances',[
  {id:1,type:'thu',desc:'Phí tháng 6',player:'Trần Minh Khoa',amount:200000,date:'2025-06-01'},
  {id:2,type:'chi',desc:'Thuê sân 3 buổi',player:'',amount:450000,date:'2025-06-05'},
  {id:3,type:'thu',desc:'Phí tháng 6',player:'Nguyễn Thu Hà',amount:200000,date:'2025-06-02'},
]);
let fines=ld('sp2_fines',[
  {id:1,player:'Hoàng Việt Long',reason:'Đến trễ 30 phút',amount:50000,date:'2025-06-15',paid:false},
  {id:2,player:'Lê Đức Thành',reason:'Bỏ buổi không báo',amount:100000,date:'2025-06-18',paid:true},
]);

const saveAll=()=>{sv('sp2_players',players);sv('sp2_matches',matches);sv('sp2_finances',finances);sv('sp2_fines',fines)};
let nP=players.length?Math.max(...players.map(p=>p.id))+1:1;
let nM=matches.length?Math.max(...matches.map(m=>m.id))+1:1;
let nF=finances.length?Math.max(...finances.map(f=>f.id))+1:1;
let nFi=fines.length?Math.max(...fines.map(f=>f.id))+1:1;

// Helpers
const fmt=n=>n.toLocaleString('vi-VN')+'đ';
const fmtD=d=>{if(!d)return'';const[y,m,da]=d.split('-');return`${da}/${m}/${y}`};
const today=()=>new Date().toISOString().split('T')[0];
const ago=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0]};
const ini=n=>n.split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
const av=(n,c,lg='')=>`<div class="av ${lg} ${c||'c0'}">${ini(n)}</div>`;
const avW=(n,c,ex='')=>`<div class="av-wrap">${av(n,c)}<span class="aname">${n}${ex}</span></div>`;
const gp=n=>players.find(p=>p.name===n);
const gpc=n=>{const p=gp(n);return p?p.color:'c0'};
const inR=(d,f,t)=>{if(f&&d<f)return false;if(t&&d>t)return false;return true};
const empty=(icon,txt)=>`<div class="empty"><div class="ei">${icon}</div><p>${txt}</p></div>`;

function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// Navigation
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const map={ranking:'xếp',matches:'trận',players:'thành',finance:'thu'};
  document.querySelectorAll('.tab-btn').forEach(b=>{if(b.textContent.toLowerCase().includes(map[id]))b.classList.add('active')});
  if(id==='ranking')renderRanking();
  if(id==='matches')renderMatches();
  if(id==='players')renderPlayers();
  if(id==='finance'){renderFinance();renderFines();renderDebt();}
}
function botActive(el){document.querySelectorAll('.bot-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active')}

// Modals
function openModal(id){
  document.getElementById(id).classList.add('open');
  if(id==='matchModal'){popMatchSel();document.getElementById('mDate').value=today();updateMF();}
  if(id==='finModal'){popFinSel();document.getElementById('finDate').value=today();}
  if(id==='fineModal'){popFineSel();document.getElementById('fineDate').value=today();}
}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open')}));

// Players
function addPlayer(){
  const name=document.getElementById('pName').value.trim();
  const score=parseInt(document.getElementById('pScore').value)||1000;
  const level=document.getElementById('pLevel').value;
  const note=document.getElementById('pNote').value.trim();
  if(!name)return alert('Vui lòng nhập tên');
  if(players.find(p=>p.name===name))return alert('Tên đã tồn tại');
  const color=COLORS[players.length%8];
  players.push({id:nP++,name,score,level,note,color,visible:true,joined:today()});
  saveAll();renderPlayers();closeModal('addPlayerModal');
  ['pName','pNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pScore').value=1000;
  notify('✅ Đã thêm: '+name);
}
function togglePlayerVis(id){const p=players.find(x=>x.id===id);if(p){p.visible=!p.visible;saveAll();renderPlayers();}}
function toggleHidden(){
  showHidden=!showHidden;
  document.getElementById('hiddenBtn').textContent=showHidden?'🙈 Ẩn thành viên ẩn':'👁 Xem thành viên ẩn';
  renderPlayers();
}
function editScore(id){
  const p=players.find(x=>x.id===id);if(!p)return;
  const ns=prompt(`Điểm mới cho ${p.name} (hiện: ${p.score}):`,p.score);
  if(ns===null)return;const n=parseInt(ns);
  if(isNaN(n))return alert('Số không hợp lệ');
  p.score=n;saveAll();renderPlayers();renderRanking();notify(`✅ Điểm ${p.name}: ${n}`);
}
function delPlayer(id){
  const p=players.find(x=>x.id===id);if(!p)return;
  if(!confirm(`Xóa ${p.name}?`))return;
  players=players.filter(x=>x.id!==id);saveAll();renderPlayers();notify('🗑 Đã xóa '+p.name);
}
function renderPlayers(){
  const list=showHidden?players:players.filter(p=>p.visible);
  if(!list.length){
    const e=empty('👥','Chưa có thành viên nào');
    document.getElementById('playerD').innerHTML=e;document.getElementById('playerM').innerHTML=e;return;
  }
  const rows=list.map(p=>`<tr>
    <td>${avW(p.name,p.color,p.visible?'':' <span class="hbadge">Ẩn</span>')}</td>
    <td><span style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--lime);font-size:1rem">${p.score}</span></td>
    <td><span class="pill p-gray">${p.level}</span></td>
    <td class="tm small">${fmtD(p.joined)}</td>
    <td class="tm small ell" style="max-width:120px">${p.note||'—'}</td>
    <td><div class="gap">
      <button class="btn btn-ghost btn-xs" onclick="editScore(${p.id})">✏️ Điểm</button>
      <button class="btn btn-ghost btn-xs" onclick="togglePlayerVis(${p.id})">${p.visible?'🙈 Ẩn':'👁 Hiện'}</button>
      <button class="btn btn-danger btn-xs" onclick="delPlayer(${p.id})">🗑</button>
    </div></td>
  </tr>`).join('');
  document.getElementById('playerD').innerHTML=`<table><thead><tr><th>Thành viên</th><th>Điểm ELO</th><th>Trình độ</th><th>Ngày vào</th><th>Ghi chú</th><th>Thao tác</th></tr></thead><tbody>${rows}</tbody></table>`;
  const cards=list.map(p=>`<div class="card-item">
    <div class="card-item-row">
      <div class="av-wrap">${av(p.name,p.color,'av-lg')}<div>
        <div class="bold">${p.name}${p.visible?'':' <span class="hbadge">Ẩn</span>'}</div>
        <div class="small tm">${p.level} · ${fmtD(p.joined)}</div>
      </div></div>
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;color:var(--lime)">${p.score}</span>
    </div>
    <div class="gap mt1">
      <button class="btn btn-ghost btn-xs" onclick="editScore(${p.id})">✏️ Sửa điểm</button>
      <button class="btn btn-ghost btn-xs" onclick="togglePlayerVis(${p.id})">${p.visible?'🙈 Ẩn':'👁 Hiện'}</button>
      <button class="btn btn-danger btn-xs" onclick="delPlayer(${p.id})">🗑 Xóa</button>
    </div>
  </div>`).join('');
  document.getElementById('playerM').innerHTML=`<div class="card-list">${cards}</div>`;
}

// Ranking
function setRankPeriod(p){
  document.getElementById('rankFrom').value=p==='all'?'':p==='week'?ago(7):ago(30);
  document.getElementById('rankTo').value=today();renderRanking();
}
function renderRanking(){
  const from=document.getElementById('rankFrom').value;
  const to=document.getElementById('rankTo').value;
  const vis=players.filter(p=>p.visible);
  const st={};vis.forEach(p=>{st[p.name]={wins:0,losses:0,played:0}});
  matches.filter(m=>inR(m.date,from,to)).forEach(m=>{
    const wt=m.winner==='A'?m.a:m.b,lt=m.winner==='A'?m.b:m.a;
    wt.forEach(n=>{if(st[n]){st[n].wins++;st[n].played++;}});
    lt.forEach(n=>{if(st[n]){st[n].losses++;st[n].played++;}});
  });
  const sorted=[...vis].sort((a,b)=>b.score-a.score);
  if(!sorted.length){
    const e=empty('🏆','Chưa có dữ liệu xếp hạng');
    document.getElementById('rankD').innerHTML=e;document.getElementById('rankM').innerHTML=e;return;
  }
  const rows=sorted.map((p,i)=>{
    const s=st[p.name]||{wins:0,losses:0,played:0};
    const wr=s.played>0?Math.round(s.wins/s.played*100):0;
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
    return`<tr>
      <td><span class="rnum ${rc}">${medal}</span></td>
      <td>${avW(p.name,p.color)}</td>
      <td><span style="font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--lime)">${p.score}</span></td>
      <td>${s.played}</td><td class="ts">${s.wins}</td><td class="td">${s.losses}</td>
      <td><span class="pill ${wr>=60?'p-green':wr>=40?'p-yellow':'p-red'}">${wr}%</span></td>
      <td><span class="pill p-gray">${p.level}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('rankD').innerHTML=`<table><thead><tr><th>#</th><th>Thành viên</th><th>Điểm ELO</th><th>Đã đấu</th><th>Thắng</th><th>Thua</th><th>Tỷ lệ</th><th>Trình độ</th></tr></thead><tbody>${rows}</tbody></table>`;
  const cards=sorted.map((p,i)=>{
    const s=st[p.name]||{wins:0,losses:0,played:0};
    const wr=s.played>0?Math.round(s.wins/s.played*100):0;
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return`<div class="card-item">
      <div class="card-item-row">
        <div class="av-wrap">
          <span class="rnum ${rc}" style="min-width:26px;text-align:center">${medal||('#'+(i+1))}</span>
          ${av(p.name,p.color,'av-lg')}
          <div><div class="bold">${p.name}</div><div class="small tm">${p.level}</div></div>
        </div>
        <span style="font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:700;color:var(--lime)">${p.score}</span>
      </div>
      <div class="card-meta mt1">
        <span>⚔️ ${s.played} trận</span>
        <span class="ts">✅ ${s.wins}W</span>
        <span class="td">❌ ${s.losses}L</span>
        <span class="pill ${wr>=60?'p-green':wr>=40?'p-yellow':'p-red'}">${wr}%</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('rankM').innerHTML=`<div class="card-list">${cards}</div>`;
}

// Matches
function setMatchPeriod(p){
  document.getElementById('matchFrom').value=p==='all'?'':p==='week'?ago(7):ago(30);
  document.getElementById('matchTo').value=today();renderMatches();
}
function popMatchSel(){
  const vis=players.filter(p=>p.visible);
  ['mA1','mA2','mB1','mB2'].forEach(id=>{document.getElementById(id).innerHTML=vis.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')});
}
function updateMF(){
  const d=document.getElementById('mType').value==='doubles'?'':'none';
  document.getElementById('mA2w').style.display=d;document.getElementById('mB2w').style.display=d;
}
function calcElo(ws,ls){return Math.round(32*(1-1/(1+Math.pow(10,(ls-ws)/400))))}
function logMatch(){
  const date=document.getElementById('mDate').value;
  const type=document.getElementById('mType').value;
  const a1=document.getElementById('mA1').value,a2=document.getElementById('mA2').value;
  const b1=document.getElementById('mB1').value,b2=document.getElementById('mB2').value;
  const sA=parseInt(document.getElementById('mScoreA').value)||0;
  const sB=parseInt(document.getElementById('mScoreB').value)||0;
  const note=document.getElementById('mNote').value.trim();
  if(!date)return alert('Chọn ngày thi đấu');
  if(sA===sB)return alert('Không thể hòa! Nhập điểm khác nhau');
  const tA=type==='singles'?[a1]:[a1,a2];
  const tB=type==='singles'?[b1]:[b1,b2];
  if(new Set([...tA,...tB]).size!==tA.length+tB.length)return alert('Có người chơi bị trùng lặp!');
  const winner=sA>sB?'A':'B';
  const wt=winner==='A'?tA:tB,lt=winner==='A'?tB:tA;
  const avgW=wt.reduce((s,n)=>{const p=gp(n);return s+(p?p.score:1000)},0)/wt.length;
  const avgL=lt.reduce((s,n)=>{const p=gp(n);return s+(p?p.score:1000)},0)/lt.length;
  const delta=calcElo(avgW,avgL);
  wt.forEach(n=>{const p=gp(n);if(p)p.score+=delta;});
  lt.forEach(n=>{const p=gp(n);if(p)p.score=Math.max(0,p.score-delta);});
  matches.push({id:nM++,date,type,a:tA,b:tB,scoreA:sA,scoreB:sB,note,winner,elo:delta});
  saveAll();closeModal('matchModal');renderMatches();renderRanking();renderPlayers();
  notify(`🏆 ${wt.join(' & ')} thắng! ±${delta} ELO`);
}
function delMatch(id){
  if(!confirm('Xóa trận? Điểm ELO không hoàn lại.'))return;
  matches=matches.filter(m=>m.id!==id);saveAll();renderMatches();notify('🗑 Đã xóa trận');
}
function renderMatches(){
  const from=document.getElementById('matchFrom').value;
  const to=document.getElementById('matchTo').value;
  const list=matches.filter(m=>inR(m.date,from,to)).sort((a,b)=>b.date.localeCompare(a.date));
  if(!list.length){
    const e=empty('🏓','Chưa có trận nào trong khoảng thời gian này');
    document.getElementById('matchD').innerHTML=e;document.getElementById('matchM').innerHTML=e;return;
  }
  const rows=list.map(m=>{
    const wA=m.winner==='A';
    return`<tr>
      <td class="tm small">${fmtD(m.date)}</td>
      <td><span class="pill p-gray">${m.type==='singles'?'Đơn':'Đôi'}</span></td>
      <td>${m.a.map(n=>avW(n,gpc(n))).join('<div style="margin:2px 0 2px 38px;font-size:.67rem;color:var(--muted)">và</div>')}</td>
      <td style="text-align:center"><div class="score-disp"><span style="color:${wA?'var(--lime)':'var(--muted)'}">${m.scoreA}</span><span style="color:var(--muted);margin:0 4px">:</span><span style="color:${!wA?'var(--lime)':'var(--muted)'}">${m.scoreB}</span></div>${m.elo?`<div class="small tm">±${m.elo} ELO</div>`:''}</td>
      <td>${m.b.map(n=>avW(n,gpc(n))).join('<div style="margin:2px 0 2px 38px;font-size:.67rem;color:var(--muted)">và</div>')}</td>
      <td><span class="pill p-lime">${(wA?m.a:m.b).join(' & ')} thắng</span></td>
      <td class="tm small">${m.note||'—'}</td>
      <td><button class="btn btn-danger btn-xs" onclick="delMatch(${m.id})">🗑</button></td>
    </tr>`;
  }).join('');
  document.getElementById('matchD').innerHTML=`<table><thead><tr><th>Ngày</th><th>Loại</th><th>Bên A</th><th style="text-align:center">Tỷ số</th><th>Bên B</th><th>Kết quả</th><th>Ghi chú</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
  const cards=list.map(m=>{
    const wA=m.winner==='A';
    const wName=(wA?m.a:m.b).join(' & ');
    return`<div class="card-item">
      <div class="card-item-row">
        <div style="min-width:0">
          <div class="bold ell" style="font-size:.85rem">${m.a.join(' & ')} <span class="tm" style="font-weight:400">vs</span> ${m.b.join(' & ')}</div>
          <div class="card-meta"><span>${fmtD(m.date)}</span><span class="pill p-gray" style="font-size:.62rem">${m.type==='singles'?'Đơn':'Đôi'}</span>${m.elo?`<span class="tm">±${m.elo} ELO</span>`:''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="score-disp"><span style="color:${wA?'var(--lime)':'var(--muted)'}">${m.scoreA}</span><span style="color:var(--muted);margin:0 3px">:</span><span style="color:${!wA?'var(--lime)':'var(--muted)'}">${m.scoreB}</span></div>
          <div class="small ts" style="margin-top:2px">🏆 ${wName}</div>
          <button class="btn btn-danger btn-xs" style="margin-top:5px" onclick="delMatch(${m.id})">🗑</button>
        </div>
      </div>
      ${m.note?`<div class="small tm" style="margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--border)">📝 ${m.note}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('matchM').innerHTML=`<div class="card-list">${cards}</div>`;
}

// Finance
function popFinSel(){
  document.getElementById('finPlayer').innerHTML=`<option value="">-- Quỹ chung --</option>`+
    players.filter(p=>p.visible).map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
}
function popFineSel(){
  document.getElementById('finePlayer').innerHTML=players.filter(p=>p.visible).map(p=>`<option value="${p.name}">${p.name}</option>`).join('');
}
function setFinPeriod(p){
  document.getElementById('finFrom').value=p==='all'?'':ago(30);
  document.getElementById('finTo').value=today();renderFinance();
}
function addFinance(){
  const type=document.getElementById('finType').value;
  const desc=document.getElementById('finDesc').value.trim();
  const amount=parseInt(document.getElementById('finAmt').value)||0;
  const player=document.getElementById('finPlayer').value;
  const date=document.getElementById('finDate').value;
  if(!desc||!amount||!date)return alert('Vui lòng điền đầy đủ');
  finances.push({id:nF++,type,desc,player,amount,date});
  saveAll();closeModal('finModal');renderFinance();renderDebt();
  notify(`✅ Đã ghi ${type==='thu'?'thu':'chi'}: ${fmt(amount)}`);
}
function addFine(){
  const player=document.getElementById('finePlayer').value;
  const reason=document.getElementById('fineReason').value.trim();
  const amount=parseInt(document.getElementById('fineAmt').value)||0;
  const date=document.getElementById('fineDate').value;
  if(!player||!reason||!amount||!date)return alert('Vui lòng điền đầy đủ');
  fines.push({id:nFi++,player,reason,amount,date,paid:false});
  saveAll();closeModal('fineModal');renderFines();renderDebt();
  notify(`⚠️ Phạt ${player}: ${fmt(amount)}`);
}
function delFinance(id){
  if(!confirm('Xóa giao dịch?'))return;
  finances=finances.filter(f=>f.id!==id);saveAll();renderFinance();renderDebt();notify('🗑 Đã xóa');
}
function payFine(id){
  const fine=fines.find(f=>f.id===id);if(!fine||fine.paid)return;
  pendingFineId=id;
  document.getElementById('payFineContent').innerHTML=`<p style="line-height:1.8">Xác nhận <strong>${fine.player}</strong> đã nộp phạt<br/><strong style="color:var(--lime);font-size:1.2rem">${fmt(fine.amount)}</strong></p><p class="tm small" style="margin-top:.4rem">Lý do: ${fine.reason}</p>`;
  openModal('payFineModal');
}
function confirmPayFine(){
  if(pendingFineId===null)return;
  const fine=fines.find(f=>f.id===pendingFineId);
  if(fine){fine.paid=true;saveAll();renderFines();renderDebt();}
  closeModal('payFineModal');pendingFineId=null;notify('✅ Đã xác nhận nộp phạt');
}
function delFine(id){
  if(!confirm('Xóa khoản phạt?'))return;
  fines=fines.filter(f=>f.id!==id);saveAll();renderFines();renderDebt();notify('🗑 Đã xóa khoản phạt');
}
function renderFinance(){
  const from=document.getElementById('finFrom').value;
  const to=document.getElementById('finTo').value;
  const list=finances.filter(f=>inR(f.date,from,to)).sort((a,b)=>b.date.localeCompare(a.date));
  const thu=list.filter(f=>f.type==='thu').reduce((s,f)=>s+f.amount,0);
  const chi=list.filter(f=>f.type==='chi').reduce((s,f)=>s+f.amount,0);
  const bal=thu-chi;
  document.getElementById('finSum').innerHTML=`
    <div class="sc"><div class="val ts">${fmt(thu)}</div><div class="lbl">Tổng thu</div></div>
    <div class="sc"><div class="val td">${fmt(chi)}</div><div class="lbl">Tổng chi</div></div>
    <div class="sc"><div class="val ${bal>=0?'tl':'td'}">${fmt(Math.abs(bal))}</div><div class="lbl">${bal>=0?'Quỹ hiện có':'Âm quỹ'}</div></div>
    <div class="sc"><div class="val">${list.length}</div><div class="lbl">Giao dịch</div></div>`;
  if(!list.length){document.getElementById('finList').innerHTML=empty('💰','Chưa có giao dịch nào');return;}
  document.getElementById('finList').innerHTML=list.map(f=>`<div class="fin-row">
    <div class="fleft"><div class="bold ell">${f.desc}</div><div class="small tm">${f.player||'Quỹ chung'} · ${fmtD(f.date)}</div></div>
    <div class="fright">
      <span class="bold ${f.type==='thu'?'ts':'td'}">${f.type==='thu'?'+':'-'}${fmt(f.amount)}</span>
      <button class="btn btn-danger btn-xs" onclick="delFinance(${f.id})">🗑</button>
    </div>
  </div>`).join('');
}
function renderFines(){
  const list=[...fines].sort((a,b)=>b.date.localeCompare(a.date));
  if(!list.length){document.getElementById('fineList').innerHTML=empty('⚠️','Chưa có khoản phạt nào');return;}
  document.getElementById('fineList').innerHTML=list.map(f=>`<div class="fin-row">
    <div class="fleft">
      <div style="display:flex;align-items:center;gap:.4rem">
        ${av(f.player,gpc(f.player))}
        <div><div class="bold">${f.player}</div><div class="small tm ell">${f.reason} · ${fmtD(f.date)}</div></div>
      </div>
    </div>
    <div class="fright">
      <span class="bold td">${fmt(f.amount)}</span>
      <span class="pill ${f.paid?'p-green':'p-red'}">${f.paid?'Đã nộp':'Chưa nộp'}</span>
      ${!f.paid?`<button class="btn btn-ghost btn-xs" onclick="payFine(${f.id})">✅</button>`:''}
      <button class="btn btn-danger btn-xs" onclick="delFine(${f.id})">🗑</button>
    </div>
  </div>`).join('');
}
function renderDebt(){
  const dm={};
  players.filter(p=>p.visible).forEach(p=>{dm[p.name]={debt:0,paid:0}});
  fines.forEach(f=>{if(!dm[f.player])dm[f.player]={debt:0,paid:0};if(!f.paid)dm[f.player].debt+=f.amount;else dm[f.player].paid+=f.amount;});
  const entries=Object.entries(dm).filter(([,v])=>v.debt>0||v.paid>0);
  if(!entries.length){document.getElementById('debtTbl').innerHTML=empty('✅','Không có công nợ');return;}
  const rows=entries.map(([name,d])=>`<tr>
    <td>${avW(name,gpc(name))}</td>
    <td class="td bold">${d.debt>0?fmt(d.debt):'—'}</td>
    <td class="ts">${d.paid>0?fmt(d.paid):'—'}</td>
    <td><span class="pill ${d.debt>0?'p-red':'p-green'}">${d.debt>0?'Còn nợ':'Sạch nợ'}</span></td>
  </tr>`).join('');
  document.getElementById('debtTbl').innerHTML=`<table><thead><tr><th>Thành viên</th><th>Còn nợ</th><th>Đã nộp</th><th>Trạng thái</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function init(){
  document.getElementById('rankTo').value=today();
  document.getElementById('matchTo').value=today();
  document.getElementById('finTo').value=today();
  document.getElementById('finFrom').value=ago(30);
  renderRanking();renderPlayers();
}
init();
</script>
</body>
</html>
